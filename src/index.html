<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Левый сайдбар: папки -->
    <aside class="sidebar">
      <div class="titlebar-drag"></div>
      <div class="sidebar-header">
        <div class="traffic-spacer"></div>
      </div>

      <div class="sidebar-content">
        <div class="sidebar-section">
          <div class="section-label">iCloud</div>
          <ul class="folder-list" id="folder-list"></ul>
        </div>
      </div>

      <div class="sidebar-footer">
        <button class="new-folder-btn" id="new-folder-btn" title="Новая папка">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 4.5C2 3.67 2.67 3 3.5 3H6.5L8 4.5H12.5C13.33 4.5 14 5.17 14 6V11.5C14 12.33 13.33 13 12.5 13H3.5C2.67 13 2 12.33 2 11.5V4.5Z" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span>Новая папка</span>
        </button>
      </div>
    </aside>

    <!-- Средняя колонка: список заметок -->
    <section class="notes-list-panel">
      <div class="titlebar-drag"></div>
      <div class="notes-list-header">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" placeholder="Поиск" class="search-input">
        </div>
      </div>

      <div class="notes-list-title">
        <h1 id="current-folder-name">Заметки</h1>
        <button class="sort-btn" title="Сортировка">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.2"/>
            <path d="M5 7H13M5 9H13M5 11H10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="notes-list" id="notes-list"></div>
    </section>

    <!-- Правая колонка: редактор -->
    <main class="editor-panel">
      <div class="editor-toolbar">
        <div class="toolbar-left">
          <button class="tb-btn" id="tb-pin" title="Закрепить">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 2L14 6L11 7L12 11L8 7L4 11V8L7 5L6 2H10Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="tb-btn" id="tb-checklist" title="Список с чек-боксами">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="3" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
              <rect x="2" y="9" width="4" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M8 5H14M8 11H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="tb-divider"></div>
          <button class="tb-btn" data-cmd="bold" title="Жирный"><b>B</b></button>
          <button class="tb-btn" data-cmd="italic" title="Курсив"><i>I</i></button>
          <button class="tb-btn" data-cmd="underline" title="Подчёркивание"><u>U</u></button>
          <div class="tb-divider"></div>
          <button class="tb-btn" data-cmd="insertUnorderedList" title="Маркированный список">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="3" cy="4" r="1" fill="currentColor"/>
              <circle cx="3" cy="8" r="1" fill="currentColor"/>
              <circle cx="3" cy="12" r="1" fill="currentColor"/>
              <path d="M6 4H14M6 8H14M6 12H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="tb-btn" data-cmd="insertOrderedList" title="Нумерованный список">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <text x="1" y="6" font-size="5" fill="currentColor">1.</text>
              <text x="1" y="11" font-size="5" fill="currentColor">2.</text>
              <path d="M6 4H14M6 10H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-right">
          <button class="tb-btn" id="tb-export" title="Экспорт в PDF">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2V10M8 10L5 7M8 10L11 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 12V13C2 13.55 2.45 14 3 14H13C13.55 14 14 13.55 14 13V12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="tb-btn tb-btn-new" id="tb-new" title="Новая заметка">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M11 2L14 5L6 13H3V10L11 2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              <path d="M10 3L13 6" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
          <button class="tb-btn" id="tb-delete" title="Удалить">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 5H13M6 5V3H10V5M5 5L5.5 13H10.5L11 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="editor-wrap" id="editor-wrap">
        <div class="editor-date" id="editor-date"></div>
        <div class="editor-content" id="editor-content" contenteditable="true" spellcheck="true"></div>
      </div>

      <div class="empty-state" id="empty-state">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" opacity="0.25">
          <rect x="14" y="10" width="44" height="52" rx="4" stroke="currentColor" stroke-width="2"/>
          <path d="M22 22H50M22 30H50M22 38H42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="empty-title">Нет выбранной заметки</div>
        <div class="empty-sub">Выберите заметку или создайте новую</div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
